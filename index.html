<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentaDesk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── VARIABLES ── */
:root {
  --bg: #0f0f0f; --bg2: #161616; --bg3: #1e1e1e; --bg4: #252525;
  --border: #2a2a2a; --border2: #333;
  --text: #f0ede8; --text2: #9a9690; --text3: #5a5855;
  --accent: #e8c97a; --accent2: #c9a84c; --accent-bg: rgba(232,201,122,0.08);
  --green: #6fcf97; --green-bg: rgba(111,207,151,0.1);
  --red: #eb5757;   --red-bg: rgba(235,87,87,0.1);
  --blue: #56b4e9;  --blue-bg: rgba(86,180,233,0.1);
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ── AUTH SCREEN ── */
#screenAuth {
  min-height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
}
.auth-logo { font-family:'DM Serif Display',serif; font-size:30px; color:var(--accent); margin-bottom:4px; }
.auth-tagline { font-size:13px; color:var(--text3); margin-bottom:32px; }
.auth-tabs { display:flex; gap:4px; background:var(--bg3); padding:4px; border-radius:var(--radius); margin-bottom:24px; }
.auth-tab {
  flex:1; padding:8px; border:none; background:none; border-radius:7px;
  font-family:'Outfit',sans-serif; font-size:13px; font-weight:500;
  color:var(--text3); cursor:pointer; transition:all 0.15s;
}
.auth-tab.active { background:var(--bg4); color:var(--text); }
.auth-error {
  background: var(--red-bg); border:1px solid rgba(235,87,87,0.2);
  border-radius:var(--radius); padding:10px 14px;
  font-size:13px; color:var(--red);
  margin-bottom:16px; display:none;
}
.auth-success {
  background:var(--green-bg); border:1px solid rgba(111,207,151,0.2);
  border-radius:var(--radius); padding:10px 14px;
  font-size:13px; color:var(--green);
  margin-bottom:16px; display:none;
}

/* ── APP LAYOUT ── */
#screenApp { display:none }

.app { display:flex; min-height:100vh }
.sidebar {
  width:240px; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:fixed; top:0;left:0;bottom:0; z-index:100;
  transition:transform 0.3s;
}
.main { margin-left:240px; flex:1; padding:32px; max-width:1100px }

/* ── SIDEBAR ── */
.sidebar-logo { padding:20px 20px 14px; border-bottom:1px solid var(--border) }
.logo-text { font-family:'DM Serif Display',serif; font-size:22px; color:var(--accent); }
.logo-sub { font-size:11px; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase }
.user-pill {
  display:flex; align-items:center; gap:8px;
  margin-top:10px; padding:6px 8px; background:var(--bg3);
  border-radius:var(--radius); font-size:11px; color:var(--text3);
}
.user-pill-dot { width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0 }
.user-pill-email { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.logout-btn {
  background:none; border:none; color:var(--text3); cursor:pointer;
  font-size:14px; padding:2px 4px; border-radius:4px; line-height:1;
  transition:color 0.15s;
}
.logout-btn:hover { color:var(--red) }
.dept-list { flex:1; overflow-y:auto; padding:12px 8px }
.dept-section-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); padding:8px 12px 6px }
.dept-item {
  display:flex; align-items:center; gap:10px; padding:9px 12px;
  border-radius:var(--radius); cursor:pointer; transition:background 0.15s; margin-bottom:2px;
}
.dept-item:hover { background:var(--bg3) }
.dept-item.active { background:var(--accent-bg) }
.dept-item.active .dept-name { color:var(--accent) }
.dept-dot { width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0 }
.dept-item.active .dept-dot { background:var(--accent) }
.dept-item.inactive .dept-name,.dept-item.inactive .dept-dot { opacity:0.4 }
.dept-name { font-size:13px; font-weight:500; flex:1 }
.add-dept-btn {
  display:flex; align-items:center; gap:8px; padding:9px 12px;
  border-radius:var(--radius); cursor:pointer; color:var(--text3); font-size:13px;
  transition:all 0.15s; margin:0 8px 4px; border:1px dashed var(--border2);
  background:none; width:calc(100% - 16px); font-family:'Outfit',sans-serif;
}
.add-dept-btn:hover { color:var(--accent); border-color:var(--accent2); background:var(--accent-bg) }
.sidebar-footer { padding:16px; border-top:1px solid var(--border) }
.overview-btn {
  width:100%; padding:9px 12px; background:none; border:1px solid var(--border2);
  border-radius:var(--radius); color:var(--text2); font-family:'Outfit',sans-serif;
  font-size:13px; cursor:pointer; text-align:left; display:flex; align-items:center; gap:8px;
  transition:all 0.15s;
}
.overview-btn:hover { background:var(--bg3); color:var(--text) }
.overview-btn.active { background:var(--blue-bg); color:var(--blue); border-color:var(--blue) }

/* ── PAGE ── */
.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:16px }
.page-title { font-family:'DM Serif Display',serif; font-size:32px; line-height:1.1 }
.page-subtitle { color:var(--text3); font-size:13px; margin-top:4px }
.header-actions { display:flex; gap:8px; flex-shrink:0 }

/* ── BUTTONS ── */
.btn {
  padding:8px 16px; border-radius:var(--radius); border:none; font-family:'Outfit',sans-serif;
  font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s;
  display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
}
.btn-primary { background:var(--accent); color:#0f0f0f }
.btn-primary:hover { background:var(--accent2) }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed }
.btn-ghost { background:var(--bg3); color:var(--text2); border:1px solid var(--border2) }
.btn-ghost:hover { background:var(--bg4); color:var(--text) }
.btn-danger { background:var(--red-bg); color:var(--red); border:1px solid rgba(235,87,87,0.2) }
.btn-danger:hover { background:rgba(235,87,87,0.2) }
.btn-sm { padding:5px 10px; font-size:12px }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:28px }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; position:relative; overflow:hidden }
.stat-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; border-radius:var(--radius-lg) var(--radius-lg) 0 0 }
.stat-card.green::before { background:var(--green) }
.stat-card.red::before   { background:var(--red) }
.stat-card.blue::before  { background:var(--blue) }
.stat-card.gold::before  { background:var(--accent) }
.stat-label { font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text3); margin-bottom:8px }
.stat-value { font-family:'DM Serif Display',serif; font-size:26px; line-height:1 }
.stat-value.green { color:var(--green) }
.stat-value.red   { color:var(--red) }
.stat-value.gold  { color:var(--accent) }
.stat-sub { font-size:11px; color:var(--text3); margin-top:6px; font-family:'DM Mono',monospace }

/* ── TABS ── */
.tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--bg2); padding:4px; border-radius:var(--radius); border:1px solid var(--border); width:fit-content }
.tab { padding:7px 16px; border-radius:7px; border:none; background:none; color:var(--text3); font-family:'Outfit',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s }
.tab.active { background:var(--bg4); color:var(--text) }
.tab:hover:not(.active) { color:var(--text2) }

/* ── TABLE ── */
.table-container { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden }
.table-toolbar { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); gap:12px }
.table-title { font-size:14px; font-weight:600 }
.table-toolbar-right { display:flex; gap:8px; align-items:center }
.filter-select {
  background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius);
  color:var(--text2); font-family:'Outfit',sans-serif; font-size:12px; padding:5px 10px; cursor:pointer; outline:none;
}
table { width:100%; border-collapse:collapse }
thead th { padding:10px 14px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text3); border-bottom:1px solid var(--border); font-weight:500; white-space:nowrap }
thead th:last-child { text-align:right }
tbody tr { transition:background 0.1s }
tbody tr:hover { background:var(--bg3) }
tbody tr:not(:last-child) td { border-bottom:1px solid var(--border) }
tbody td { padding:12px 14px; font-size:13px; vertical-align:middle }
tbody td:last-child { text-align:right }
.td-date { font-family:'DM Mono',monospace; font-size:12px; color:var(--text3); white-space:nowrap }
.td-motivo { max-width:260px }
.td-amount { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; white-space:nowrap }
.td-amount.ingreso { color:var(--green) }
.td-amount.egreso  { color:var(--red) }
.badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap }
.badge-green { background:var(--green-bg); color:var(--green) }
.badge-gold  { background:var(--accent-bg); color:var(--accent) }
.badge-gray  { background:var(--bg4); color:var(--text3) }
.row-actions { display:flex; gap:4px; justify-content:flex-end }
.icon-btn { background:none; border:none; cursor:pointer; color:var(--text3); padding:4px 6px; border-radius:6px; font-size:13px; transition:all 0.15s; line-height:1 }
.icon-btn:hover { background:var(--bg4); color:var(--text) }
.icon-btn.del:hover { color:var(--red); background:var(--red-bg) }

/* ── EMPTY / LOADING ── */
.empty-state { text-align:center; padding:48px 20px; color:var(--text3) }
.empty-icon  { font-size:32px; margin-bottom:12px; opacity:0.5 }
.loading-state { text-align:center; padding:48px 20px; color:var(--text3) }
.spinner {
  width:24px; height:24px; border:2px solid var(--border2);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin 0.7s linear infinite; margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg) } }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(4px);
  z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all }
.modal {
  background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg);
  padding:28px; width:100%; max-width:480px; box-shadow:var(--shadow);
  transform:translateY(12px); transition:transform 0.2s;
}
.modal-overlay.open .modal { transform:translateY(0) }
.modal-title { font-family:'DM Serif Display',serif; font-size:22px; margin-bottom:20px }
.form-group { margin-bottom:16px }
.form-label { display:block; font-size:12px; font-weight:500; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px }
.form-input,.form-select,.form-textarea {
  width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius);
  color:var(--text); font-family:'Outfit',sans-serif; font-size:14px; padding:10px 12px; outline:none; transition:border-color 0.15s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent2) }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px }
.form-check { display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom:16px }
.form-check input { accent-color:var(--accent); width:15px; height:15px; cursor:pointer }
.form-check label { font-size:13px; color:var(--text2); cursor:pointer }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:24px; padding-top:16px; border-top:1px solid var(--border) }
.preview-box { background:var(--bg3); border-radius:var(--radius); padding:12px; margin-bottom:16px; font-size:12px; color:var(--text2); font-family:'DM Mono',monospace; display:none }

/* ── RESUMEN ── */
.mes-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border) }
.mes-row:last-child { border-bottom:none }
.mes-values { display:flex; gap:16px; align-items:center }
.mes-ing { font-family:'DM Mono',monospace; font-size:12px; color:var(--green) }
.mes-egr { font-family:'DM Mono',monospace; font-size:12px; color:var(--red) }
.mes-bal { font-family:'DM Mono',monospace; font-size:12px; font-weight:500 }
.mes-bal.pos { color:var(--green) }
.mes-bal.neg { color:var(--red) }

/* ── OVERVIEW CARDS ── */
.overview-dept-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:12px; cursor:pointer; transition:border-color 0.15s,background 0.15s }
.overview-dept-card:hover { border-color:var(--border2); background:var(--bg3) }
.overview-dept-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px }
.overview-dept-name { font-family:'DM Serif Display',serif; font-size:18px }
.overview-dept-stats { display:flex; gap:20px }
.overview-stat { text-align:right }
.overview-stat-label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text3) }
.overview-stat-value { font-family:'DM Mono',monospace; font-size:14px; font-weight:500 }

/* ── MOBILE ── */
.hamburger { display:none }
::-webkit-scrollbar { width:4px }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px }

@media (max-width:768px) {
  .sidebar { transform:translateX(-100%) }
  .sidebar.open { transform:translateX(0) }
  .main { margin-left:0; padding:16px; padding-top:60px }
  .hamburger { display:flex; position:fixed; top:16px; left:16px; z-index:300; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius); padding:8px; cursor:pointer; color:var(--text); font-size:18px; line-height:1 }
  .page-header { flex-direction:column }
  .form-row { grid-template-columns:1fr }
  .stats-grid { grid-template-columns:1fr 1fr }
  .overview-dept-stats { gap:10px; flex-wrap:wrap }
}
</style>
</head>
<body>

<!-- ═══════════════ AUTH SCREEN ═══════════════ -->
<div id="screenAuth">
  <div class="auth-card">
    <div class="auth-logo">RentaDesk</div>
    <div class="auth-tagline">Gestión de alquileres temporarios</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="setAuthTab('login')">Iniciar sesión</button>
      <button class="auth-tab" id="tabRegister" onclick="setAuthTab('register')">Registrarse</button>
    </div>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <div id="formLogin">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="btnLogin" onclick="doLogin()">
        Entrar
      </button>
    </div>

    <div id="formRegister" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" type="password" id="regPass" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input class="form-input" type="password" id="regPass2" placeholder="Repetí la contraseña" onkeydown="if(event.key==='Enter')doRegister()" />
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="btnRegister" onclick="doRegister()">
        Crear cuenta
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="screenApp">
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-text">RentaDesk</div>
        <div class="logo-sub">Gestión de alquileres</div>
        <div class="user-pill">
          <div class="user-pill-dot"></div>
          <div class="user-pill-email" id="userEmail">—</div>
          <button class="logout-btn" onclick="doLogout()" title="Cerrar sesión">⏻</button>
        </div>
      </div>
      <div class="dept-list" id="deptList"></div>
      <div style="padding:8px 8px 4px">
        <button class="add-dept-btn" onclick="openDeptModal()">+ Nuevo departamento</button>
      </div>
      <div class="sidebar-footer">
        <button class="overview-btn" id="overviewBtn" onclick="showOverview()">⊞ Vista general</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main">
      <!-- OVERVIEW -->
      <div id="viewOverview" style="display:none">
        <div class="page-header">
          <div><div class="page-title">Vista general</div><div class="page-subtitle">Todos tus departamentos</div></div>
        </div>
        <div class="stats-grid" id="overviewStats"></div>
        <div id="overviewList"></div>
      </div>

      <!-- DEPT -->
      <div id="viewDept" style="display:none">
        <div class="page-header">
          <div>
            <div class="page-title" id="deptTitle">—</div>
            <div class="page-subtitle" id="deptSubtitle">—</div>
          </div>
          <div class="header-actions">
            <button class="btn btn-ghost btn-sm" onclick="exportDept()">↓ CSV</button>
            <button class="btn btn-ghost btn-sm" onclick="editCurrentDept()">✎ Editar</button>
            <button class="btn btn-danger btn-sm" id="toggleDeptBtn" onclick="toggleDeptStatus()">— Dar de baja</button>
          </div>
        </div>
        <div class="stats-grid" id="deptStats"></div>
        <div class="tabs">
          <button class="tab active" id="tabIngresos" onclick="switchTab('ingresos')">Ingresos</button>
          <button class="tab" id="tabEgresos"  onclick="switchTab('egresos')">Egresos</button>
          <button class="tab" id="tabResumen"  onclick="switchTab('resumen')">Resumen</button>
        </div>
        <div id="panelIngresos">
          <div class="table-container">
            <div class="table-toolbar">
              <span class="table-title">Ingresos</span>
              <div class="table-toolbar-right">
                <select class="filter-select" id="filtroMesIngresos" onchange="renderIngresos()"><option value="">Todos los meses</option></select>
                <button class="btn btn-primary btn-sm" onclick="openIngresoModal()">+ Ingreso</button>
              </div>
            </div>
            <div id="tableIngresos"></div>
          </div>
        </div>
        <div id="panelEgresos" style="display:none">
          <div class="table-container">
            <div class="table-toolbar">
              <span class="table-title">Egresos</span>
              <div class="table-toolbar-right">
                <select class="filter-select" id="filtroMesEgresos" onchange="renderEgresos()"><option value="">Todos los meses</option></select>
                <button class="btn btn-primary btn-sm" onclick="openEgresoModal()">+ Egreso</button>
              </div>
            </div>
            <div id="tableEgresos"></div>
          </div>
        </div>
        <div id="panelResumen" style="display:none"><div id="resumenContent"></div></div>
      </div>

      <!-- EMPTY -->
      <div id="viewEmpty">
        <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
          <div class="empty-state">
            <div class="empty-icon">🏢</div>
            <div style="margin-bottom:16px">Creá tu primer departamento para empezar</div>
            <button class="btn btn-primary" onclick="openDeptModal()">+ Nuevo departamento</button>
          </div>
        </div>
      </div>

      <!-- LOADING -->
      <div id="viewLoading">
        <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
          <div class="loading-state"><div class="spinner"></div>Cargando...</div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL DEPARTAMENTO -->
<div class="modal-overlay" id="modalDept" onclick="closeModalIf(event,'modalDept')">
  <div class="modal">

      <button class="btn btn-ghost" onclick="closeModal('modalEgreso')">Cancelar</button>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURACIÓN — REEMPLAZÁ ESTOS VALORES
// ═══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://vohgsunfetqxuzvhonct.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvaGdzdW5mZXRxeHV6dmhvbmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzU1NzUsImV4cCI6MjA5MDIxMTU3NX0.txRJ0P3Mc0AZf3yD0qEFYfoZU3pxct3wtOSnSvS1smE';
// ═══════════════════════════════════════════════════

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ──
let currentUser = null;
let currentDeptId = null;
let currentTab = 'ingresos';
let editingDeptId = null;
let editingIngresoId = null;
let editingEgresoId = null;

// Cache local para velocidad
let cache = { departamentos: [], ingresos: [], egresos: [] };

// ── UTILS ──
const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const fmt = (n, dec=0) => n == null || isNaN(n) ? '—' : new Intl.NumberFormat('es-AR',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n);
const fmtMoney = (n, m='ARS') => (n == null || isNaN(n)) ? '—' : (m==='USD'?'U$D ':'$ ') + fmt(Math.abs(n), m==='USD'?2:0);
const mesKey = f => { if(!f) return ''; const d = new Date(f+'T12:00:00'); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0') };
const mesLabel = k => { if(!k) return ''; const [y,m]=k.split('-'); return meses[parseInt(m)-1]+' '+y };
const todayStr = () => new Date().toISOString().slice(0,10);
const uid = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);

// ── AUTH ──
function setAuthTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('formLogin').style.display = tab==='login'?'':'none';
  document.getElementById('formRegister').style.display = tab==='register'?'':'none';
  clearAuthMessages();
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = '';
  document.getElementById('authSuccess').style.display = 'none';
}
function showAuthSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.style.display = '';
  document.getElementById('authError').style.display = 'none';
}
function clearAuthMessages() {
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showAuthError('Completá email y contraseña'); return; }
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) showAuthError(error.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos' : error.message);
}

async function doRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  if (!email || !pass) { showAuthError('Completá todos los campos'); return; }
  if (pass !== pass2) { showAuthError('Las contraseñas no coinciden'); return; }
  if (pass.length < 6) { showAuthError('La contraseña debe tener al menos 6 caracteres'); return; }
  const btn = document.getElementById('btnRegister');
  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  const { error } = await sb.auth.signUp({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Crear cuenta';
  if (error) showAuthError(error.message);
  else showAuthSuccess('Cuenta creada. Revisá tu email para confirmar (o iniciá sesión si no tenés confirmación activada).');
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  cache = { departamentos: [], ingresos: [], egresos: [] };
  document.getElementById('screenApp').style.display = 'none';
  document.getElementById('screenAuth').style.display = 'flex';
}


async function enterApp(user) {
  currentUser = user;
  document.getElementById('screenAuth').style.display = 'none';
  document.getElementById('screenApp').style.display = 'block';
  document.getElementById('userEmail').textContent = user.email;

  // Mostrar loading visible
  ['viewOverview','viewDept','viewEmpty','viewLoading'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  const loadingEl = document.getElementById('viewLoading');
  if (loadingEl) loadingEl.style.display = 'block';

  try {
    await loadAllData();
    renderSidebar();
    const activos = cache.departamentos.filter(d => d.activo !== false);
    if (activos.length > 0) selectDept(activos[0].id);
    else {
      ['viewOverview','viewDept','viewLoading'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      document.getElementById('viewEmpty').style.display = 'block';
    }
  } catch(err) {
    console.error('enterApp error:', err);
    document.getElementById('viewLoading').style.display = 'none';
    document.getElementById('viewEmpty').style.display = 'block';
    document.getElementById('viewEmpty').innerHTML = '<div style="padding:40px;color:#eb5757;font-size:14px">Error: ' + err.message + '<br><br><button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;background:#333;color:#fff;border:none;border-radius:8px;cursor:pointer">Reintentar</button></div>';
  }
}

async function loadAllData() {
  const [deptRes, ingRes, egrRes] = await Promise.all([
    sb.from('departamentos').select('*').order('creado_en'),
    sb.from('ingresos').select('*').order('fecha', {ascending:false}),
    sb.from('egresos').select('*').order('fecha', {ascending:false}),
  ]);
  if (deptRes.error) throw new Error('Tabla departamentos: ' + deptRes.error.message);
  if (ingRes.error)  throw new Error('Tabla ingresos: '      + ingRes.error.message);
  if (egrRes.error)  throw new Error('Tabla egresos: '       + egrRes.error.message);
  cache.departamentos = deptRes.data || [];
  cache.ingresos      = (ingRes.data  || []).map(i => ({...i, deptId: i.dept_id}));
  cache.egresos       = (egrRes.data  || []).map(e => ({...e, deptId: e.dept_id}));
}

// ── VIEWS ──
function showView(name) {
  ['overview','dept','empty','loading'].forEach(v => {
    document.getElementById('view' + v.charAt(0).toUpperCase() + v.slice(1)).style.display = v===name ? '' : 'none';
  });
  document.getElementById('overviewBtn').classList.toggle('active', name==='overview');
}

function showOverview() {
  currentDeptId = null;
  showView('overview');
  renderSidebar();
  renderOverview();
  closeSidebarMobile();
}

function selectDept(id) {
  currentDeptId = id;
  showView('dept');
  renderSidebar();
  renderDeptView();
  closeSidebarMobile();
}

// ── SIDEBAR ──
function renderSidebar() {
  const activos   = cache.departamentos.filter(d => d.activo !== false);
  const inactivos = cache.departamentos.filter(d => d.activo === false);
  let html = '<div class="dept-section-label">Departamentos</div>';
  if (cache.departamentos.length === 0) html += `<div style="padding:12px;font-size:12px;color:var(--text3)">Sin departamentos aún</div>`;
  activos.forEach(d => {
    html += `<div class="dept-item ${currentDeptId===d.id?'active':''}" onclick="selectDept('${d.id}')"><div class="dept-dot"></div><div class="dept-name">${d.nombre}</div></div>`;
  });
  if (inactivos.length > 0) {
    html += '<div class="dept-section-label" style="margin-top:8px">Dados de baja</div>';
    inactivos.forEach(d => {
      html += `<div class="dept-item inactive ${currentDeptId===d.id?'active':''}" onclick="selectDept('${d.id}')"><div class="dept-dot"></div><div class="dept-name">${d.nombre}</div></div>`;
    });
  }
  document.getElementById('deptList').innerHTML = html;
}

// ── OVERVIEW ──
function renderOverview() {
  const depts = cache.departamentos.filter(d => d.activo !== false);
  let tIng=0, tEgr=0, tUSD=0;
  depts.forEach(d => {
    cache.ingresos.filter(i=>i.deptId===d.id).forEach(i => { if(i.moneda==='USD') tUSD+=i.monto; else tIng+=(i.aplicar25?i.monto*0.75:i.monto); });
    cache.egresos.filter(e=>e.deptId===d.id).forEach(e => tEgr+=e.monto);
  });
  const bal = tIng - tEgr;
  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card green"><div class="stat-label">Ingresos ARS</div><div class="stat-value green">${fmtMoney(tIng)}</div><div class="stat-sub">${depts.length} deptos activos</div></div>
    <div class="stat-card red"><div class="stat-label">Egresos</div><div class="stat-value red">${fmtMoney(tEgr)}</div></div>
    <div class="stat-card ${bal>=0?'green':'red'}"><div class="stat-label">Balance ARS</div><div class="stat-value ${bal>=0?'green':'red'}">${fmtMoney(bal)}</div></div>
    <div class="stat-card gold"><div class="stat-label">Total USD</div><div class="stat-value gold">${fmtMoney(tUSD,'USD')}</div></div>`;
  let html = '';
  if (depts.length === 0) {
    html = `<div class="empty-state"><div class="empty-icon">🏢</div><div style="margin-bottom:16px">No hay departamentos activos</div><button class="btn btn-primary" onclick="openDeptModal()">+ Nuevo departamento</button></div>`;
  } else {
    depts.forEach(d => {
      let di=0,de=0,du=0;
      cache.ingresos.filter(i=>i.deptId===d.id).forEach(i => { if(i.moneda==='USD') du+=i.monto; else di+=(i.aplicar25?i.monto*0.75:i.monto); });
      cache.egresos.filter(e=>e.deptId===d.id).forEach(e => de+=e.monto);
      const db = di-de;
      html += `<div class="overview-dept-card" onclick="selectDept('${d.id}')">
        <div class="overview-dept-header">
          <div class="overview-dept-name">${d.nombre}</div>
          <div class="overview-dept-stats">
            <div class="overview-stat"><div class="overview-stat-label">Ingresos</div><div class="overview-stat-value" style="color:var(--green)">${fmtMoney(di)}</div></div>
            <div class="overview-stat"><div class="overview-stat-label">Egresos</div><div class="overview-stat-value" style="color:var(--red)">${fmtMoney(de)}</div></div>
            <div class="overview-stat"><div class="overview-stat-label">Balance</div><div class="overview-stat-value" style="color:${db>=0?'var(--green)':'var(--red)'}">${fmtMoney(db)}</div></div>
            ${du>0?`<div class="overview-stat"><div class="overview-stat-label">USD</div><div class="overview-stat-value" style="color:var(--accent)">${fmtMoney(du,'USD')}</div></div>`:''}
          </div>
        </div>
        ${d.direccion?`<div style="font-size:12px;color:var(--text3)">${d.direccion}</div>`:''}
      </div>`;
    });
  }
  document.getElementById('overviewList').innerHTML = html;
}

// ── DEPT VIEW ──
function renderDeptView() {
  const dept = cache.departamentos.find(d => d.id === currentDeptId);
  if (!dept) return;
  document.getElementById('deptTitle').textContent = dept.nombre;
  document.getElementById('deptSubtitle').textContent = dept.direccion || (dept.activo===false?'Dado de baja':'Activo');
  const btn = document.getElementById('toggleDeptBtn');
  btn.textContent = dept.activo===false ? '✓ Reactivar' : '— Dar de baja';
  btn.className = dept.activo===false ? 'btn btn-ghost btn-sm' : 'btn btn-danger btn-sm';
  renderStats(); renderIngresos(); renderEgresos(); populateMesFiltros();
}

function renderStats() {
  const ing = cache.ingresos.filter(i => i.deptId === currentDeptId);
  const egr = cache.egresos.filter(e => e.deptId === currentDeptId);
  let ars=0, usd=0, tot=0;
  ing.forEach(i => { if(i.moneda==='USD') usd+=i.monto; else ars+=(i.aplicar25?i.monto*0.75:i.monto); });
  egr.forEach(e => tot+=e.monto);
  const bal = ars-tot;
  document.getElementById('deptStats').innerHTML = `
    <div class="stat-card green"><div class="stat-label">Ingresos netos ARS</div><div class="stat-value green">${fmtMoney(ars)}</div><div class="stat-sub">${ing.filter(i=>i.moneda!=='USD').length} registros</div></div>
    <div class="stat-card gold"><div class="stat-label">Ingresos USD</div><div class="stat-value gold">${fmtMoney(usd,'USD')}</div><div class="stat-sub">${ing.filter(i=>i.moneda==='USD').length} registros</div></div>
    <div class="stat-card red"><div class="stat-label">Total egresos</div><div class="stat-value red">${fmtMoney(tot)}</div><div class="stat-sub">${egr.length} registros</div></div>
    <div class="stat-card ${bal>=0?'green':'red'}"><div class="stat-label">Balance ARS</div><div class="stat-value ${bal>=0?'green':'red'}">${fmtMoney(bal)}</div></div>`;
}

function populateMesFiltros() {
  const ing = cache.ingresos.filter(i=>i.deptId===currentDeptId);
  const egr = cache.egresos.filter(e=>e.deptId===currentDeptId);
  const mI = [...new Set(ing.map(i=>mesKey(i.fecha)))].filter(Boolean).sort().reverse();
  const mE = [...new Set(egr.map(e=>mesKey(e.fecha)))].filter(Boolean).sort().reverse();
  const sI = document.getElementById('filtroMesIngresos');
  const sE = document.getElementById('filtroMesEgresos');
  const vI = sI.value, vE = sE.value;
  sI.innerHTML = '<option value="">Todos los meses</option>' + mI.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');
  sE.innerHTML = '<option value="">Todos los meses</option>' + mE.map(m=>`<option value="${m}">${mesLabel(m)}</option>`).join('');
  if(vI) sI.value=vI; if(vE) sE.value=vE;
}

function switchTab(tab) {
  currentTab = tab;
  ['ingresos','egresos','resumen'].forEach(t => {
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
    document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===tab?'':'none';
  });
  if (tab==='resumen') renderResumen();
}

function renderIngresos() {
  const filtro = document.getElementById('filtroMesIngresos').value;
  let rows = cache.ingresos.filter(i=>i.deptId===currentDeptId);
  if (filtro) rows = rows.filter(i=>mesKey(i.fecha)===filtro);
  if (rows.length===0) {
    document.getElementById('tableIngresos').innerHTML = `<div class="empty-state"><div class="empty-icon">📥</div><div style="margin-bottom:16px">Sin ingresos registrados</div><button class="btn btn-primary btn-sm" onclick="openIngresoModal()">+ Agregar ingreso</button></div>`;
    return;
  }
  let html = `<table><thead><tr><th>Fecha</th><th>Motivo</th><th>Bruto</th><th>Comisión</th><th>Neto</th><th></th></tr></thead><tbody>`;
  rows.forEach(i => {
    const com = i.aplicar25 && i.moneda!=='USD' ? i.monto*0.25 : 0;
    const neto = i.moneda==='USD' ? i.monto : (i.aplicar25?i.monto*0.75:i.monto);
    html += `<tr>
      <td class="td-date">${i.fecha}</td>
      <td class="td-motivo">${i.motivo}</td>
      <td class="td-amount ingreso">${fmtMoney(i.monto,i.moneda)}</td>
      <td>${com>0?`<span class="badge badge-gold">- ${fmtMoney(com)}</span>`:'<span class="badge badge-gray">—</span>'}</td>
      <td class="td-amount">${i.moneda==='USD'?`<span class="badge badge-gold">${fmtMoney(neto,'USD')}</span>`:fmtMoney(neto)}</td>
      <td><div class="row-actions">
        <button class="icon-btn" onclick="editIngreso('${i.id}')">✎</button>
        <button class="icon-btn del" onclick="deleteIngreso('${i.id}')">✕</button>
      </div></td>
    </tr>`;
  });
  const tn = rows.filter(r=>r.moneda!=='USD').reduce((s,r)=>s+(r.aplicar25?r.monto*0.75:r.monto),0);
  const tu = rows.filter(r=>r.moneda==='USD').reduce((s,r)=>s+r.monto,0);
  html += `</tbody><tfoot><tr style="border-top:2px solid var(--border2)">
    <td colspan="4" style="padding:12px 14px;font-size:12px;font-weight:600;color:var(--text2)">TOTAL</td>
    <td style="padding:12px 14px"><span style="color:var(--green);font-family:'DM Mono',monospace;font-size:13px">${fmtMoney(tn)}</span>${tu>0?`<br><span style="color:var(--accent);font-size:11px;font-family:'DM Mono',monospace">${fmtMoney(tu,'USD')}</span>`:''}</td>
    <td></td></tr></tfoot></table>`;
  document.getElementById('tableIngresos').innerHTML = html;
}

function renderEgresos() {
  const filtro = document.getElementById('filtroMesEgresos').value;
  let rows = cache.egresos.filter(e=>e.deptId===currentDeptId);
  if (filtro) rows = rows.filter(e=>mesKey(e.fecha)===filtro);
  if (rows.length===0) {
    document.getElementById('tableEgresos').innerHTML = `<div class="empty-state"><div class="empty-icon">📤</div><div style="margin-bottom:16px">Sin egresos registrados</div><button class="btn btn-primary btn-sm" onclick="openEgresoModal()">+ Agregar egreso</button></div>`;
    return;
  }
  let html = `<table><thead><tr><th>Fecha</th><th>Motivo</th><th>Monto</th><th></th></tr></thead><tbody>`;
  rows.forEach(e => {
    html += `<tr>
      <td class="td-date">${e.fecha}</td>
      <td class="td-motivo">${e.motivo}</td>
      <td class="td-amount egreso">${fmtMoney(e.monto)}</td>
      <td><div class="row-actions">
        <button class="icon-btn" onclick="editEgreso('${e.id}')">✎</button>
        <button class="icon-btn del" onclick="deleteEgreso('${e.id}')">✕</button>
      </div></td>
    </tr>`;
  });
  const tot = rows.reduce((s,r)=>s+r.monto,0);
  html += `</tbody><tfoot><tr style="border-top:2px solid var(--border2)">
    <td colspan="2" style="padding:12px 14px;font-size:12px;font-weight:600;color:var(--text2)">TOTAL</td>
    <td class="td-amount egreso" style="padding:12px 14px">${fmtMoney(tot)}</td>
    <td></td></tr></tfoot></table>`;
  document.getElementById('tableEgresos').innerHTML = html;
}

function renderResumen() {
  const ing = cache.ingresos.filter(i=>i.deptId===currentDeptId);
  const egr = cache.egresos.filter(e=>e.deptId===currentDeptId);
  const allMonths = [...new Set([...ing.map(i=>mesKey(i.fecha)),...egr.map(e=>mesKey(e.fecha))])].filter(Boolean).sort();
  if (allMonths.length===0) {
    document.getElementById('resumenContent').innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div>Agregá ingresos y egresos para ver el resumen</div></div>`;
    return;
  }
  let tA=0,tU=0,tE=0;
  let mesRows='';
  allMonths.forEach(mk => {
    const mI=ing.filter(i=>mesKey(i.fecha)===mk), mE=egr.filter(e=>mesKey(e.fecha)===mk);
    const ars=mI.filter(i=>i.moneda!=='USD').reduce((s,i)=>s+(i.aplicar25?i.monto*0.75:i.monto),0);
    const usd=mI.filter(i=>i.moneda==='USD').reduce((s,i)=>s+i.monto,0);
    const et=mE.reduce((s,e)=>s+e.monto,0);
    const bal=ars-et; tA+=ars; tU+=usd; tE+=et;
    mesRows+=`<div class="mes-row">
      <div>${mesLabel(mk)}</div>
      <div class="mes-values">
        <span class="mes-ing">${fmtMoney(ars)}</span>
        ${usd>0?`<span class="badge badge-gold" style="font-size:10px">${fmtMoney(usd,'USD')}</span>`:''}
        <span class="mes-egr">${fmtMoney(et)}</span>
        <span class="mes-bal ${bal>=0?'pos':'neg'}">${bal>=0?'+':''}${fmtMoney(bal)}</span>
      </div>
    </div>`;
  });
  const tb=tA-tE;
  document.getElementById('resumenContent').innerHTML=`
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card green"><div class="stat-label">Ingresos netos ARS</div><div class="stat-value green">${fmtMoney(tA)}</div></div>
      <div class="stat-card gold"><div class="stat-label">Ingresos USD</div><div class="stat-value gold">${fmtMoney(tU,'USD')}</div></div>
      <div class="stat-card red"><div class="stat-label">Egresos totales</div><div class="stat-value red">${fmtMoney(tE)}</div></div>
      <div class="stat-card ${tb>=0?'green':'red'}"><div class="stat-label">Balance total</div><div class="stat-value ${tb>=0?'green':'red'}">${fmtMoney(tb)}</div></div>
    </div>
    <div class="table-container">
      <div class="table-toolbar"><span class="table-title">Por mes</span><span style="font-size:11px;color:var(--text3)">Ing. neto · USD · Egresos · Balance</span></div>
      <div style="padding:0 16px 8px">${mesRows}</div>
    </div>`;
}

// ── DEPT CRUD ──
function openDeptModal(id) {
  editingDeptId = id || null;
  document.getElementById('deptModalTitle').textContent = id ? 'Editar departamento' : 'Nuevo departamento';
  if (id) {
    const d = cache.departamentos.find(x=>x.id===id);
    document.getElementById('deptNombre').value = d.nombre;
    document.getElementById('deptDireccion').value = d.direccion||'';
    document.getElementById('deptNotas').value = d.notas||'';
  } else {
    document.getElementById('deptNombre').value='';
    document.getElementById('deptDireccion').value='';
    document.getElementById('deptNotas').value='';
  }
  openModal('modalDept');
}

function editCurrentDept() { openDeptModal(currentDeptId); }

async function saveDept() {
  const nombre = document.getElementById('deptNombre').value.trim();
  if (!nombre) { alert('El nombre es obligatorio'); return; }
  const btn = document.getElementById('saveDeptBtn');
  btn.disabled=true; btn.textContent='Guardando...';
  const data = { nombre, direccion:document.getElementById('deptDireccion').value.trim()||null, notas:document.getElementById('deptNotas').value.trim()||null };
  let error;
  if (editingDeptId) {
    ({ error } = await sb.from('departamentos').update(data).eq('id', editingDeptId));
    if (!error) { const d=cache.departamentos.find(x=>x.id===editingDeptId); Object.assign(d, data); }
  } else {
    const { data:row, error:e } = await sb.from('departamentos').insert({...data, user_id:currentUser.id}).select().single();
    error=e;
    if (!error) { cache.departamentos.push({...row, activo:true}); currentDeptId=row.id; }
  }
  btn.disabled=false; btn.textContent='Guardar';
  if (error) { alert('Error: '+error.message); return; }
  closeModal('modalDept');
  renderSidebar();
  if (currentDeptId) { showView('dept'); renderDeptView(); }
}

async function toggleDeptStatus() {
  const dept = cache.departamentos.find(d=>d.id===currentDeptId);
  if (!dept) return;
  const newVal = dept.activo===false;
  if (!newVal && !confirm(`¿Dar de baja "${dept.nombre}"?`)) return;
  const { error } = await sb.from('departamentos').update({ activo:newVal }).eq('id', currentDeptId);
  if (error) { alert('Error: '+error.message); return; }
  dept.activo = newVal;
  renderSidebar(); renderDeptView();
}

// ── INGRESO CRUD ──
function openIngresoModal(id) {
  editingIngresoId = id || null;
  document.getElementById('ingresoModalTitle').textContent = id ? 'Editar ingreso' : 'Nuevo ingreso';
  if (id) {
    const i=cache.ingresos.find(x=>x.id===id);
    document.getElementById('ingresoFecha').value=i.fecha;
    document.getElementById('ingresoMotivo').value=i.motivo;
    document.getElementById('ingresoMonto').value=i.monto;
    document.getElementById('ingresoMoneda').value=i.moneda||'ARS';
    document.getElementById('ingresoAplicar25').checked=!!i.aplicar25;
  } else {
    document.getElementById('ingresoFecha').value=todayStr();
    document.getElementById('ingresoMotivo').value='';
    document.getElementById('ingresoMonto').value='';
    document.getElementById('ingresoMoneda').value='ARS';
    document.getElementById('ingresoAplicar25').checked=false;
  }
  toggleMoneda(); toggle25();
  openModal('modalIngreso');
}

function editIngreso(id) { openIngresoModal(id); }

function toggleMoneda() {
  const esUSD = document.getElementById('ingresoMoneda').value==='USD';
  document.getElementById('grupoPorcentaje').style.display = esUSD?'none':'';
  if (esUSD) document.getElementById('ingresoAplicar25').checked=false;
  toggle25();
}

function toggle25() {
  const check = document.getElementById('ingresoAplicar25').checked;
  const monto = parseFloat(document.getElementById('ingresoMonto').value)||0;
  const prev = document.getElementById('preview25');
  if (check && monto>0) {
    const com=monto*0.25, neto=monto*0.75;
    prev.innerHTML=`Bruto: $ ${fmt(monto)} → Comisión: -$ ${fmt(com)} → <strong style="color:var(--green)">Neto: $ ${fmt(neto)}</strong>`;
    prev.style.display='';
  } else { prev.style.display='none'; }
}

async function saveIngreso() {
  const fecha=document.getElementById('ingresoFecha').value;
  const motivo=document.getElementById('ingresoMotivo').value.trim();
  const monto=parseFloat(document.getElementById('ingresoMonto').value);
  const moneda=document.getElementById('ingresoMoneda').value;
  const aplicar25=document.getElementById('ingresoAplicar25').checked;
  if (!fecha||!motivo||isNaN(monto)||monto<=0) { alert('Completá fecha, motivo y monto'); return; }
  const btn=document.getElementById('saveIngresoBtn');
  btn.disabled=true; btn.textContent='Guardando...';
  const row={fecha,motivo,monto,moneda,aplicar25};
  let error;
  if (editingIngresoId) {
    ({ error }=await sb.from('ingresos').update(row).eq('id',editingIngresoId));
    if(!error){ const i=cache.ingresos.find(x=>x.id===editingIngresoId); Object.assign(i,row); }
  } else {
    const {data,error:e}=await sb.from('ingresos').insert({...row,dept_id:currentDeptId,user_id:currentUser.id}).select().single();
    error=e;
    if(!error) cache.ingresos.unshift({...data,deptId:data.dept_id});
  }
  btn.disabled=false; btn.textContent='Guardar';
  if(error){ alert('Error: '+error.message); return; }
  closeModal('modalIngreso');
  renderStats(); renderIngresos(); populateMesFiltros();
}

async function deleteIngreso(id) {
  if(!confirm('¿Eliminar este ingreso?')) return;
  const {error}=await sb.from('ingresos').delete().eq('id',id);
  if(error){ alert('Error: '+error.message); return; }
  cache.ingresos=cache.ingresos.filter(i=>i.id!==id);
  renderStats(); renderIngresos(); populateMesFiltros();
}

// ── EXPORT ──
function exportDept() {
  const dept=cache.departamentos.find(d=>d.id===currentDeptId);
  const ing=cache.ingresos.filter(i=>i.deptId===currentDeptId).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const egr=cache.egresos.filter(e=>e.deptId===currentDeptId).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  let csv=`INGRESOS - ${dept.nombre}\r\nFecha,Motivo,Monto,Moneda,Aplicar 25%,Comisión,Total Neto\r\n`;
  ing.forEach(i=>{ const com=i.aplicar25&&i.moneda!=='USD'?i.monto*0.25:0; const neto=i.moneda==='USD'?i.monto:(i.aplicar25?i.monto*0.75:i.monto); csv+=`${i.fecha},"${i.motivo}",${i.monto},${i.moneda},${i.aplicar25?'SI':'NO'},${com},${neto}\r\n`; });
  csv+=`\r\nEGRESOS - ${dept.nombre}\r\nFecha,Motivo,Monto\r\n`;
  egr.forEach(e=>{ csv+=`${e.fecha},"${e.motivo}",${e.monto}\r\n`; });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${dept.nombre.replace(/\s+/g,'_')}.csv`; a.click();
}

// ── START ──
async function init() {
  // Mostrar algo de inmediato mientras carga
  document.getElementById('screenAuth').style.display = 'none';
  document.getElementById('screenApp').style.display = 'none';

  let started = false;

  // Timeout de seguridad: si en 5s no pasó nada, mostrar login
  const safetyTimeout = setTimeout(() => {
    if (!started) {
      document.getElementById('screenAuth').style.display = 'flex';
    }
  }, 5000);

  try {
    // Chequear sesión activa directamente
    const { data: { session } } = await sb.auth.getSession();

    if (session && !started) {
      started = true;
      clearTimeout(safetyTimeout);
      await enterApp(session.user);
    } else if (!session) {
      clearTimeout(safetyTimeout);
      document.getElementById('screenAuth').style.display = 'flex';
    }

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && !started) {
        started = true;
        clearTimeout(safetyTimeout);
        await enterApp(session.user);
      }
      if (event === 'SIGNED_OUT') {
        started = false;
        cache = { departamentos: [], ingresos: [], egresos: [] };
        document.getElementById('screenApp').style.display = 'none';
        document.getElementById('screenAuth').style.display = 'flex';
      }
    });
  } catch(err) {
    console.error('Init error:', err);
    clearTimeout(safetyTimeout);
    document.getElementById('screenAuth').style.display = 'flex';
  }
}

init();
</script>
